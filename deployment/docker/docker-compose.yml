services:
  postgres:
    image: postgres:16-alpine
    container_name: parslex-postgres
    environment:
      POSTGRES_USER: parslex
      POSTGRES_PASSWORD: parslex
      POSTGRES_DB: parslex
    ports:
      - "5432:5432"
    volumes:
      - parslex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parslex"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: parslex-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: parslex
      MINIO_ROOT_PASSWORD: parslexsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - parslex-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parslex-redis
    ports:
      - "6379:6379"
    volumes:
      - parslex-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: parslex-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: parslex
      RABBITMQ_DEFAULT_PASS: parslex
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - parslex-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: parslex-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - parslex-qdrant-data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: parslex-ollama
    ports:
      - "11434:11434"
    volumes:
      - parslex-ollama-data:/root/.ollama
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: parslex-api
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://parslex:parslex@postgres:5432/parslex
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: parslex
      MINIO_SECRET_KEY: parslexsecret
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      AI_MODELS_CONFIG: config/ai/models.yaml
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ../../knowledge:/app/knowledge:ro
      - ../../config:/app/config:ro

volumes:
  parslex-postgres-data:
  parslex-minio-data:
  parslex-redis-data:
  parslex-rabbitmq-data:
  parslex-qdrant-data:
  parslex-ollama-data:

networks:
  default:
    name: parslex-network
